name: chainguard-catalog-watch

on:
  schedule:
    - cron: "0 13 * * *"        # daily ~13:00 UTC
  workflow_dispatch:
    inputs:
      bootstrap:
        description: "Seed the baseline from the current catalog WITHOUT opening an issue (run once)."
        type: boolean
        default: false
      category:
        description: "Optional: scope to a directory category (application, base, ai, fips, ...). Blank = full catalog."
        type: string
        default: ""

permissions:
  contents: write       # commit the state file
  issues: write         # open the triage issue

concurrency:
  group: chainguard-catalog-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    env:
      STATE: .state/catalog.json
      ISSUE_BODY: catalog_body.md
      BOOTSTRAP: ${{ inputs.bootstrap }}
      DIR_CATEGORY: ${{ inputs.category || '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect new catalog images
        id: detect
        run: python3 .github/scripts/detect_new_repos.py

      - name: Open triage issue
        if: steps.detect.outputs.notify == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create chainguard-catalog \
            --color 0e8a16 \
            --description "New public Chainguard catalog images to evaluate" \
            --force >/dev/null 2>&1 || true
          gh issue create \
            --title "${{ steps.detect.outputs.title }}" \
            --body-file "$ISSUE_BODY" \
            --label chainguard-catalog

      - name: Persist state
        if: steps.detect.outputs.persist == 'true'
        run: |
          git config user.name  github-actions
          git config user.email github-actions@github.com
          git pull --rebase --autostash || true
          git add "$STATE"
          git commit -m "catalog snapshot $(date -u +%FT%TZ)" || exit 0
          for i in 1 2 3; do
            git pull --rebase --autostash && git push && break
            sleep 5
          done
